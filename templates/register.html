<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Digital Library</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/main.js"></script>
</head>
<body>
    <div class="auth-container">
        <h2>Student Registration</h2>
        <form id="registerForm">
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('password', this)">Show</button>
                </div>
            </div>
            <button type="submit" class="btn">Register</button>
        </form>
        <p style="text-align: center; margin-top: 15px;">
            Already have an account? <a href="/login">Login here</a>
        </p>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nameInput = document.getElementById('name');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            
            nameInput.classList.remove('input-error');
            emailInput.classList.remove('input-error');
            passwordInput.classList.remove('input-error');
            
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: nameInput.value, email: emailInput.value, password: passwordInput.value })
                });
                const data = await res.json();
                
                if (res.ok) {
                    showToast("Registration successful! You can now login.", "success");
                    document.getElementById('registerForm').reset();
                    setTimeout(() => window.location.href = '/login', 1500);
                } else {
                    showToast(data.error || 'Registration failed', "error");
                    if (data.error && data.error.includes('Email')) {
                        emailInput.classList.add('input-error');
                    } else {
                        nameInput.classList.add('input-error');
                        emailInput.classList.add('input-error');
                        passwordInput.classList.add('input-error');
                    }
                }
            } catch (err) {
                showToast("An error occurred", "error");
            }
        });
    </script>
</body>
</html>
