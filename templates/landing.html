<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vista of Volumes - Welcome</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #canvas-container {
            width: 100%;
            height: 60vh; /* 60% of viewport height */
        }
        .landing-content {
            text-align: center;
            padding: 20px;
            z-index: 10;
        }
        .landing-content h1 {
            font-size: 4rem;
            color: #2c3e50;
            margin-bottom: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 
                1px 1px 0px #d1d9e6,
                2px 2px 0px #d1d9e6,
                3px 3px 0px #d1d9e6,
                4px 4px 0px #d1d9e6,
                5px 5px 0px #d1d9e6,
                6px 6px 0px #bdc3c7,
                7px 7px 10px rgba(0,0,0,0.2);
        }
        .landing-content p {
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 30px;
        }
        .landing-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .landing-buttons a {
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s;
        }
        .btn-primary {
            background-color: #3498db;
            color: white;
        }
        .btn-primary:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .btn-secondary {
            background-color: #fff;
            color: #3498db;
            border: 2px solid #3498db;
        }
        .btn-secondary:hover {
            background-color: #f0f8ff;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        @media (max-width: 768px) {
            .landing-content h1 {
                font-size: 2.2rem;
            }
            .landing-content p {
                font-size: 1rem;
            }
            .landing-buttons {
                flex-direction: column;
                gap: 10px;
            }
            .landing-buttons a {
                width: 100%;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>

    <div class="landing-content">
        <h1>Vista of Volumes</h1>
        <p>Your gateway to infinite knowledge. Explore, learn, and grow.</p>
        <div class="landing-buttons">
            <a href="/login" class="btn-primary">Login</a>
            <a href="/register" class="btn-secondary">Register</a>
        </div>
    </div>
    
    <div id="canvas-container"></div>

    <script>
        const container = document.getElementById('canvas-container');
        
        // Scene setup
        const scene = new THREE.Scene();
        // background color matching body
        scene.background = new THREE.Color('#f4f7f6'); 
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / (window.innerHeight * 0.6), 0.1, 100);
        camera.position.set(0, 5, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight * 0.6);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // Group to hold the stack of books
        const stack = new THREE.Group();
        scene.add(stack);

        // Colors for books
        const colors = [0xe74c3c, 0x3498db, 0xf1c40f, 0x2ecc71, 0x9b59b6];
        
        // Create 5 stacked books
        let currentY = 0;
        for (let i = 0; i < 5; i++) {
            // Randomize width and depth slightly for realistic imperfect stacking
            const width = 3 + Math.random() * 1;
            const height = 0.4 + Math.random() * 0.3;
            const depth = 2.5 + Math.random() * 0.5;
            
            const geometry = new THREE.BoxGeometry(width, height, depth);
            const material = new THREE.MeshStandardMaterial({ 
                color: colors[i % colors.length],
                roughness: 0.7,
                metalness: 0.1
            });
            
            const book = new THREE.Mesh(geometry, material);
            book.castShadow = true;
            book.receiveShadow = true;
            
            // Stack them on top of each other, slightly offset and rotated
            currentY += height / 2;
            book.position.y = currentY;
            book.position.x = (Math.random() - 0.5) * 0.3;
            book.position.z = (Math.random() - 0.5) * 0.3;
            book.rotation.y = (Math.random() - 0.5) * 0.2;
            
            currentY += height / 2; // prep for next book
            
            stack.add(book);
        }
        
        // Center the stack vertically based on total height
        stack.position.y = -(currentY / 2);

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            // Slow auto-rotation
            stack.rotation.y += 0.003;
            renderer.render(scene, camera);
        }
        animate();

        // Handle Resize
        window.addEventListener('resize', () => {
            const height = window.innerHeight * 0.6;
            renderer.setSize(window.innerWidth, height);
            camera.aspect = window.innerWidth / height;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
